    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        background: linear-gradient(135deg, #fbefcf 0%, #f6ead4 48%, #ede8f3 100%);

      .panel-gallery {
        padding: 40px 16px 24px;
        min-height: 100vh;
      }

      .panel-gallery-grid {
        width: min(100%, 1320px);
        margin: 0 auto;
        display: grid;
        gap: 24px;
      }

      .panel-card {
        margin: 0;
        padding: 18px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.74);
        box-shadow: 0 18px 48px rgba(69, 49, 20, 0.12);
      }

      .panel-card img {
        display: block;
        width: 100%;
        height: auto;
        border-radius: 16px;
      }

      .panel-card figcaption {
        margin-top: 12px;
        color: #4d443d;
        font-size: 14px;
        line-height: 1.5;
        text-align: center;
      }

      @media (min-width: 900px) {
        .panel-gallery-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
