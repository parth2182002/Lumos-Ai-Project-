<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Electrical Ai | Control and Power Panel Solutions</title>
    <meta name="author" content="Electrical Ai" />
    <link rel="sitemap" type="application/xml" href="https://agent.infinityfree.me/sitemap.xml" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <script>
      window.ELECTRICAL_AI_ILLUSTRATIONS = {
        leftHand: "illustrations/68.png",
        sea: "illustrations/905.png",
        man: "illustrations/2785.png",
        defaultPanel: "illustrations/538.png"
      };
    </script>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        background: linear-gradient(135deg, #fbefcf 0%, #f6ead4 48%, #ede8f3 100%);
      }

      .panel-gallery {
        padding: 40px 16px 24px;
        min-height: 100vh;
      }

      .panel-gallery-grid {
        width: min(100%, 1320px);
        margin: 0 auto;
        display: grid;
        gap: 24px;
      }

      .panel-card {
        margin: 0;
        padding: 18px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.74);
        box-shadow: 0 18px 48px rgba(69, 49, 20, 0.12);
      }

      .panel-card img {
        display: block;
        width: 100%;
        height: auto;
        border-radius: 16px;
      }

      .panel-card figcaption {
        margin-top: 12px;
        color: #4d443d;
        font-size: 14px;
        line-height: 1.5;
        text-align: center;
      }

      @media (min-width: 900px) {
        .panel-gallery-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>

  <body>
    <img src="illustrations/905.png" alt="Electrical panel" />

    <main class="panel-gallery">
      <div class="panel-gallery-grid">
        <figure class="panel-card">
          <img src="illustrations/68.png" alt="Electrical panel view 1" loading="eager" />
          <figcaption>Electrical panel image 1</figcaption>
        </figure>

        <figure class="panel-card">
          <img src="illustrations/538.png" alt="Electrical panel view 2" loading="lazy" />
          <figcaption>Electrical panel image 2</figcaption>
        </figure>

        <figure class="panel-card">
          <img src="illustrations/905.png" alt="Electrical panel view 3" loading="lazy" />
          <figcaption>Electrical panel image 3</figcaption>
        </figure>

        <figure class="panel-card">
          <img src="../illustrations/2785.png" alt="Electrical panel view 4" loading="lazy" />
          <figcaption>Electrical panel image 4</figcaption>
        </figure>
      </div>
    </main>
  </body>
</html>
